{% extends "base.html" %}{% block title %}AI文章整理 | VulnNote Manager{% endblock %}{% block content %}<nav class="breadcrumbs" aria-label="パンくず"><a href="{{ url_for('catalog.note_detail', note_id=note.id) }}">{{ note.title }}</a> / AI文章整理</nav><div class="page-header"><div><p class="eyebrow">外部送信の準備</p><h1>整理する項目を選択</h1></div></div><form method="post" class="panel form-grid"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><p>選択したテキストだけをOpenAI APIへ送ります。画像と選択外の項目は送信しません。</p>{% for field,label in fields.items() %}<label><input type="checkbox" name="field" value="{{ field }}" {% if note[field] %}checked{% endif %}> {{ label }} — {{ (note[field] or '未入力')|truncate(100) }}</label>{% endfor %}<div class="actions"><button class="button external-action" type="submit">送信内容を確認する</button><a href="{{ url_for('catalog.note_detail', note_id=note.id) }}">キャンセル</a></div></form>{% endblock %}
